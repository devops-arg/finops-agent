version: "3.8"

services:
  # ── LocalStack: simulated AWS for demo mode ──────────────
  localstack:
    image: localstack/localstack:3
    container_name: finops-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: ec2,s3,rds,elasticache,eks,sts,iam,cloudwatch,route53,secretsmanager
      DEFAULT_REGION: us-east-1
      DEBUG: 0
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Seed LocalStack with demo resources ──────────────────
  seed:
    build:
      context: .
      dockerfile: Dockerfile
    command: python scripts/seed_localstack.py
    env_file: .env
    environment:
      LOCALSTACK_URL: http://localstack:4566
    depends_on:
      localstack:
        condition: service_healthy
    restart: "no"

  # ── FinOps Agent API backend ──────────────────────────────
  finops-agent:
    build: .
    container_name: finops-backend
    ports:
      - "${PORT:-8000}:8000"
    env_file: .env
    environment:
      LOCALSTACK_URL: http://localstack:4566
    # report_data.json is created at runtime; no bind-mount needed
    depends_on:
      localstack:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Frontend (nginx static) ───────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: finops-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - finops-agent
    restart: unless-stopped

volumes:
  localstack-data:
