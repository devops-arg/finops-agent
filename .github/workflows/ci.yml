name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger for ad-hoc runs (e.g. testing a workflow change without a push)
  workflow_dispatch:

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - run: mypy backend

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - run: pytest -ra

  audit:
    name: Dependency vulnerability audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install pip-audit==2.7.3
      # --strict fails the job on any known CVE in a runtime dep.
      # Dev deps audited too but reported separately so they don't block PRs.
      - name: Audit runtime deps
        run: pip-audit -r requirements.txt --strict
      - name: Audit dev deps (non-blocking)
        continue-on-error: true
        run: pip-audit -r requirements-dev.txt

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: finops-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
